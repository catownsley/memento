name: Security Scan (Nightly Deep)

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql_deep:
    name: CodeQL (Deep)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL (Deep Queries)
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python-deep

  bandit_deep:
    name: Bandit (Deep SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]"

      - name: Run Bandit (Medium+)
        run: |
          bandit -r src --severity-level medium --confidence-level medium -f sarif -o bandit-deep-results.sarif

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-deep-results.sarif
          category: bandit-deep

  pip-audit-strict:
    name: Dependency Vulnerabilities (Strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan dependencies (FAIL on vulnerabilities)
        run: |
          echo "::notice::Strict mode: Build will FAIL if vulnerabilities found"
          pip-audit -r requirements.txt --desc --strict
