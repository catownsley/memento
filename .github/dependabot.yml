version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    reviewers:
      - "catownsley"
    labels:
      - "dependencies"
      - "security"
    # Combine all minor and patch bumps into a single weekly PR.
    # Major bumps are left out of the group so they still arrive
    # as individual PRs for deliberate review.
    groups:
      python_minor_and_patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci):"
      include: "scope"
    labels:
      - "ci/cd"
    groups:
      github_actions_all:
        patterns:
          - "*"
